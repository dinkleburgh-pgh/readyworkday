<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Badge Component</title>
    <style>
      body { margin: 0; font-family: Inter, system-ui, Arial; }
      .badge-row { display:flex; align-items:center; gap:8px; padding:6px; }
      .bubble { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:12px; color:#fff; }
      .label { font-weight:600; text-align:left; }
      .btn { display:flex; align-items:center; gap:8px; width:100%; padding:8px; border-radius:8px; border:1px solid rgba(0,0,0,0.06); background:transparent; cursor:pointer; }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script>
      // Read parameters passed via window.location.search
      function params() {
        const s = window.location.search.substring(1);
        const obj = {};
        s.split('&').forEach(p => {
          if(!p) return;
          const [k,v] = p.split('=');
          obj[decodeURIComponent(k)] = decodeURIComponent(v||'');
        });
        return obj;
      }

      const p = params();
      const label = p.label || 'Status';
      const value = p.value || '';
      const color = p.color || '#888888';
      const target = p.target || '';

      const root = document.getElementById('root');
      const row = document.createElement('div');
      row.className = 'badge-row';

      const btn = document.createElement('button');
      btn.className = 'btn';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.style.background = color;
      bubble.textContent = value;

      const lab = document.createElement('div');
      lab.className = 'label';
      lab.textContent = `${label}  •  ${value}`;

      btn.appendChild(bubble);
      btn.appendChild(lab);
      row.appendChild(btn);
      root.appendChild(row);

      // On click, post a message that the Streamlit component backend will pick up
      btn.addEventListener('click', () => {
        // The special message used by Streamlit components: setComponentValue
        try {
          window.parent.postMessage({isStreamlitMessage: true, type: 'streamlit:setComponentValue', value: {target: target, clicked: true}}, '*');
        } catch(e) {
          // fallback: navigate via query param (still same tab)
          window.location.search = '?page=' + encodeURIComponent(target);
        }
      });

      // Resize iframe to fit
      function resize() {
        const h = root.getBoundingClientRect().height + 8;
        window.parent.postMessage({isStreamlitMessage: true, type: 'streamlit:height', height: h}, '*');
      }
      setTimeout(resize, 50);
    </script>
  </body>
</html>
