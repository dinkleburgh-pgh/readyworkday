version: "3.8"

services:
  truckapp:
    image: ${IMAGE_NAME:-ghcr.io/dinkleburgh-pgh/readyworkday:latest}
    container_name: truckapp
    working_dir: /app
    ports:
      - "${HOST_PORT:-8501}:8501"
    environment:
      APP_FILE: ${APP_FILE:-app_unloadv1.5.py}
      STREAMLIT_SERVER_PORT: 8501
      STREAMLIT_SERVER_ADDRESS: 0.0.0.0
    command:
      - sh
      - -c
      - |
          APP_PATH=""
          if [ -n "$$APP_FILE" ] && [ -f "$$APP_FILE" ]; then
            APP_PATH="$$APP_FILE"
          fi
          if [ -z "$$APP_PATH" ]; then
            for candidate in app_unloadv*.py app_unload*.py; do
              if [ -f "$$candidate" ]; then
                APP_PATH="$$candidate"
              fi
            done
          fi
          if [ -z "$$APP_PATH" ] && [ -d /app ]; then
            APP_PATH="$$(find /app -maxdepth 2 -type f \( -name 'app_unloadv*.py' -o -name 'app_unload*.py' \) ! -path '/app/backups/*' | sort | tail -n 1 || true)"
          fi
          if [ -z "$$APP_PATH" ]; then
            echo "No app_unload*.py file found." >&2
            echo "APP_FILE=$$APP_FILE PWD=$$(pwd)" >&2
            echo "Top-level files in /app:" >&2
            ls -la /app >&2 || true
            exit 1
          fi
          echo "Launching Streamlit app: $$APP_PATH"
          exec streamlit run "$$APP_PATH" --server.port="$$STREAMLIT_SERVER_PORT" --server.address="$$STREAMLIT_SERVER_ADDRESS" --server.headless=true
    restart: unless-stopped