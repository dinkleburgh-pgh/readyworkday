services:
  truckapp:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${IMAGE_NAME:-ghcr.io/dinkleburgh-pgh/readyworkday:latest}
    container_name: truckapp
    working_dir: /app
    ports:
      - "${HOST_PORT:-8501}:8501"
    environment:
      APP_FILE: ${APP_FILE:-app_unloadv1.6.py}
      STREAMLIT_SERVER_PORT: 8501
      STREAMLIT_SERVER_ADDRESS: 0.0.0.0
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
      TRUCKAPP_AUTH_COOKIE_NAME: ${TRUCKAPP_AUTH_COOKIE_NAME:-truckapp_auth}
      TRUCKAPP_AUTH_COOKIE_KEY: ${TRUCKAPP_AUTH_COOKIE_KEY:-truckapp_cookie_key_change_me_please_override_with_random_32_plus_chars}
      TRUCKAPP_AUTH_COOKIE_DAYS: ${TRUCKAPP_AUTH_COOKIE_DAYS:-7}
    volumes:
      - ./:/app
    restart: unless-stopped
